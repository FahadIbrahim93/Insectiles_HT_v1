name: CI

on:
  push:
    branches: ["main", "dev", "work"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (TypeScript)
        run: pnpm run lint

      - name: Generate and validate branch audit artifact
        run: pnpm run audit:branches:verify

      - name: Audit production dependencies
        run: pnpm run audit:prod

      - name: Test
        run: pnpm run test

      - name: Coverage report
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for E2E
        run: pnpm run build

      - name: Run Playwright E2E tests
        run: pnpm exec playwright test --config=playwright.config.ts
